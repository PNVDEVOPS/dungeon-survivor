<!DOCTYPE html>
<html lang="ru">
<head>

<link rel="stylesheet" href="css/style.css">
<!-- Yandex Games SDK (loaded conditionally) -->
<script>
  // Detect if running inside Yandex Games iframe
  try {
    if (window.location.hostname.includes('yandex') || document.referrer.includes('yandex')) {
      let s = document.createElement('script');
      s.src = 'https://yandex.ru/games/sdk/v2';
      document.head.appendChild(s);
    }
  } catch(e) {}
</script>
<!-- CrazyGames SDK (loaded conditionally) -->
<script>
  try {
    if (window.location.hostname.includes('crazygames') || document.referrer.includes('crazygames')) {
      let s = document.createElement('script');
      s.src = 'https://sdk.crazygames.com/crazygames-sdk-v3.js';
      document.head.appendChild(s);
    }
  } catch(e) {}
</script>
</head>

  <div class="pn" id="p-gn"><div class="cg" id="gng"></div></div>

</div>
